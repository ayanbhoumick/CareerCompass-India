<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCompass India | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
        }
        .btn-hover {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.4);
        }
        .btn-hover:active {
            transform: translateY(0);
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
        .progress-bar-container {
            background: rgba(255,255,255,0.1);
            border-radius: 999px;
            overflow: hidden;
            height: 12px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #fbbf24);
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="overflow-hidden">

<header class="glass-panel border-b border-white/10 p-6 flex items-center justify-between z-10 sticky top-0">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-orange-500 to-yellow-400 flex items-center justify-center shadow-lg shadow-orange-500/30">
            <i data-lucide="compass" class="text-white"></i>
        </div>
        <div>
            <h1 class="text-2xl font-extrabold tracking-tight">CareerCompass <span class="text-orange-500">India.</span></h1>
            <p class="text-xs text-slate-400 font-medium">Live job market intelligence for Indian CS students</p>
        </div>
    </div>
</header>

<div class="flex flex-1 h-[calc(100vh-89px)]">
    <!-- Sidebar -->
    <aside class="w-80 glass-panel border-r border-white/10 p-6 flex flex-col gap-6 overflow-y-auto z-10">
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">Target Role</label>
                <input id="role" value="software engineer" placeholder="e.g. backend engineer" class="input-field w-full rounded-lg px-4 py-3 mt-1 text-sm font-medium">
            </div>
            <div>
                <label class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">Target City</label>
                <input id="city" value="Mumbai" placeholder="e.g. Bangalore" class="input-field w-full rounded-lg px-4 py-3 mt-1 text-sm font-medium">
            </div>
            <div>
                <label class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">Your Skills</label>
                <input id="skills" placeholder="Java, Python, Git" class="input-field w-full rounded-lg px-4 py-3 mt-1 text-sm font-medium">
            </div>
        </div>

        <div class="space-y-3 mt-4">
            <button onclick="load('demand')" class="btn-hover w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-xl py-3 px-4 flex items-center gap-3 font-semibold text-sm transition-colors">
                <i data-lucide="bar-chart-2" class="w-5 h-5 text-blue-400"></i> Market Demand
            </button>
            <button onclick="load('gap')" class="btn-hover w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-xl py-3 px-4 flex items-center gap-3 font-semibold text-sm transition-colors">
                <i data-lucide="target" class="w-5 h-5 text-emerald-400"></i> Skill Gap
            </button>
            <button onclick="load('curriculum')" class="btn-hover w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-xl py-3 px-4 flex items-center gap-3 font-semibold text-sm transition-colors">
                <i data-lucide="book-open" class="w-5 h-5 text-purple-400"></i> Curriculum Audit
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto relative">
        <!-- Decoration -->
        <div class="absolute top-[-20%] left-[-10%] w-96 h-96 bg-orange-500/20 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-96 h-96 bg-blue-500/20 rounded-full blur-[100px] pointer-events-none"></div>

        <div id="output" class="glass-panel border-white/10 rounded-2xl p-8 min-h-[400px] relative z-10 shadow-2xl">
            <div class="h-full flex flex-col items-center justify-center text-slate-500 fade-in py-20">
                <i data-lucide="activity" class="w-16 h-16 mb-4 opacity-50"></i>
                <p class="font-medium text-slate-400">Select an analysis from the left panel to begin.</p>
            </div>
        </div>
    </main>
</div>

<script>
    lucide.createIcons();
    
    const out = document.getElementById('output');
    const role = () => document.getElementById('role').value;
    const city = () => document.getElementById('city').value;
    const skills = () => document.getElementById('skills').value;

    async function load(type) {
        if (!role() || !city()) { alert('Please enter role and city'); return; }
        
        out.innerHTML = `
            <div class="h-full flex flex-col items-center justify-center py-20 fade-in">
                <div class="w-12 h-12 border-4 border-slate-700 border-t-orange-500 rounded-full animate-spin"></div>
                <p class="mt-6 text-sm font-bold tracking-widest uppercase text-slate-400">Processing Data...</p>
            </div>
        `;

        try {
            if (type === 'demand') {
                const res = await fetch(`/api/skills/demand?role=${encodeURIComponent(role())}&city=${encodeURIComponent(city())}&topN=15`);
                const data = await res.json();
                
                out.innerHTML = `
                    <div class="fade-in h-full flex flex-col">
                        <div class="flex items-center gap-3 mb-8">
                            <div class="p-2 bg-blue-500/20 rounded-lg"><i data-lucide="bar-chart-2" class="text-blue-400"></i></div>
                            <h2 class="text-3xl font-extrabold">Market Demand</h2>
                        </div>
                        <div class="flex-1 min-h-[400px] relative">
                            <canvas id="chart"></canvas>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                
                const ctx = document.getElementById('chart').getContext('2d');
                new Chart(ctx, {
                    type: 'pie',
                    data: { 
                        labels: data.map(d => d.name), 
                        datasets: [{ 
                            data: data.map(d => d.demandCount), 
                            backgroundColor: data.map((_, i) => `hsla(${i * 360 / data.length}, 80%, 60%, 0.8)`),
                            borderColor: 'transparent',
                            hoverOffset: 10
                        }] 
                    },
                    options: { 
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { position: 'right', labels: { color: '#cbd5e1', font: { family: 'Outfit', size: 14 } } } 
                        } 
                    }
                });
            }
            if (type === 'gap') {
                const list = skills().split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
                if (!list.length) { alert('Please enter your skills'); return; }
                const res = await fetch(`/api/skills/gap?role=${encodeURIComponent(role())}&city=${encodeURIComponent(city())}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(list)
                });
                const d = await res.json();
                const matched = d.matchedSkills || [];
                const missing = d.missingSkills || [];
                const recs = d.reccommendations || d.recommendations || [];
                
                out.innerHTML = `
                    <div class="fade-in">
                        <div class="flex items-center justify-between mb-8">
                            <div class="flex items-center gap-3">
                                <div class="p-2 bg-emerald-500/20 rounded-lg"><i data-lucide="target" class="text-emerald-400"></i></div>
                                <h2 class="text-3xl font-extrabold">Skill Gap Analysis</h2>
                            </div>
                            <div class="text-right">
                                <div class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-amber-300">
                                    ${Math.round(d.matchScore || 0)}%
                                </div>
                                <div class="text-xs font-bold tracking-widest uppercase text-slate-400">Match Score</div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-6">
                                <div>
                                    <h3 class="text-sm font-bold tracking-widest text-slate-400 uppercase mb-3 border-b border-white/10 pb-2">Matched Proficiencies</h3>
                                    <div class="flex flex-wrap gap-2">
                                        ${matched.length ? matched.map(s => `<span class="px-3 py-1 bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 rounded-full text-xs font-bold uppercase tracking-wide">${s}</span>`).join('') : '<span class="text-slate-500 text-sm italic">None matched</span>'}
                                    </div>
                                </div>

                                <div>
                                    <h3 class="text-sm font-bold tracking-widest text-slate-400 uppercase mb-3 border-b border-white/10 pb-2">Missing Critical Skills</h3>
                                    <div class="flex flex-wrap gap-2">
                                        ${missing.length ? missing.map(s => `<span class="px-3 py-1 bg-rose-500/20 text-rose-300 border border-rose-500/30 rounded-full text-xs font-bold uppercase tracking-wide">${s}</span>`).join('') : '<span class="text-emerald-400 text-sm font-bold">No gap found!</span>'}
                                    </div>
                                </div>
                            </div>

                            <div class="glass-panel border-white/5 bg-white/5 rounded-xl p-6 relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-orange-400 to-amber-300"></div>
                                <h3 class="text-sm font-bold tracking-widest text-slate-300 uppercase mb-4 flex items-center gap-2">
                                    <i data-lucide="map" class="w-4 h-4"></i> Roadmap Recommendations
                                </h3>
                                <ul class="space-y-3">
                                    ${recs.map(r => `
                                        <li class="flex items-start gap-3 bg-black/20 p-3 rounded-lg border border-white/5">
                                            <i data-lucide="check-circle-2" class="w-5 h-5 text-orange-400 shrink-0 mt-0.5"></i> 
                                            <span class="text-sm font-medium text-slate-200 uppercase">${r}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            }
            if (type === 'curriculum') {
                const list = skills().split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
                const res = await fetch(`/api/curriculum/gap?role=${encodeURIComponent(role())}&city=${encodeURIComponent(city())}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(list)
                });
                const d = await res.json();
                const perc = Math.round(d.coveragePercentage || 0);
                
                out.innerHTML = `
                    <div class="fade-in">
                        <div class="flex items-center gap-3 mb-8">
                            <div class="p-2 bg-purple-500/20 rounded-lg"><i data-lucide="book-open" class="text-purple-400"></i></div>
                            <h2 class="text-3xl font-extrabold">Curriculum Audit</h2>
                        </div>

                        <div class="glass-panel bg-white/5 border-white/10 rounded-xl p-6 mb-8">
                            <div class="flex justify-between items-end mb-2">
                                <span class="text-sm font-bold tracking-widest uppercase text-slate-400">Syllabus Coverage</span>
                                <span class="text-3xl font-black text-white">${perc}%</span>
                            </div>
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" id="bar" style="width:0%"></div>
                            </div>
                        </div>

                        <h3 class="text-sm font-bold tracking-widest text-slate-400 uppercase mb-4 border-b border-white/10 pb-2">Subject Relevance Scores</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${Object.entries(d.subjectRelevanceScores || {}).map(([sub, score]) => `
                                <div class="glass-panel bg-black/20 border-white/5 p-4 rounded-xl flex justify-between items-center transition-transform hover:scale-[1.02]">
                                    <span class="text-sm font-medium text-slate-300 leading-tight pr-4">${sub}</span>
                                    <span class="text-xl font-black ${score > 60 ? 'text-emerald-400' : score > 30 ? 'text-amber-400' : 'text-slate-500'}">${Math.round(score)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                lucide.createIcons();
                setTimeout(() => {
                    const bar = document.getElementById('bar');
                    if(bar) bar.style.width = perc + '%';
                }, 50);
            }
        } catch (e) {
            console.error(e);
            out.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center fade-in text-rose-400 py-10">
                    <i data-lucide="alert-triangle" class="w-12 h-12 mb-4"></i>
                    <p class="font-bold text-lg">Communication Error</p>
                    <p class="text-sm text-rose-300/70 mt-2 text-center max-w-sm">Make sure the backend is running and the inputs are valid. (${e.message})</p>
                </div>
            `;
            lucide.createIcons();
        }
    }
</script>
</body>
</html>
