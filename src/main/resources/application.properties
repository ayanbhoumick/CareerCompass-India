spring.application.name = careercompass

# H2 Database
spring.datasource.url = jdbc:h2:mem:careercompassdb
spring.datasource.driver-class-name = org.h2.Driver
spring.datasource.username = sa
spring.datasource.password =
spring.jpa.database-platform = org.hibernate.dialect.H2Dialect
spring.h2.console.enabled = true

# JPA
spring.jpa.hibernate.ddl-auto = create-drop
spring.jpa.show-sql = true

# API credentials — set these as environment variables: ADZUNA_APP_ID, ADZUNA_APP_KEY, JSEARCH_API_KEY
adzuna.app.id = ${ADZUNA_APP_ID}
adzuna.app.key = ${ADZUNA_APP_KEY}

# JSearch API (RapidAPI) — get key at rapidapi.com/letscrape-6bRBa3QguO5/api/jsearch
jsearch.api.key = ${JSEARCH_API_KEY}

